[project]
name = "trion-shared"
version = "0.1.0"
description = "Trion Scale — schemas Pydantic partilhados entre backend e scripts"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "email-validator>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["src"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
mypy_path = "src"
